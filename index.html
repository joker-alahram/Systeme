<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }

    .order-card {
      background: #222;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    .open-btn {
      margin-top: 10px;
      padding: 5px 10px;
    }

    .sheet {
      position: fixed;
      bottom: -100%;
      left: 0;
      right: 0;
      height: 80%;
      background: #fff;
      color: #000;
      transition: 0.3s;
      border-radius: 20px 20px 0 0;
      padding: 20px;
    }

    .sheet.open {
      bottom: 0;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
    }

    .backdrop.show {
      display: block;
    }
  </style>
</head>

<body>

<h2>Orders</h2>

<div id="ordersContainer"></div>

<div id="sheetBackdrop" class="backdrop"></div>

<div id="bottomSheet" class="sheet">
  <div id="sheetBody"></div>
</div>

<script>
console.log("APP STARTED");

// STATE
const state = {
  orders: [],
  selectedOrder: null
};

// بيانات تجريبية
state.orders = [
  {
    id: 1,
    order_number: "INV-1001",
    status: "pending",
    customer_name: "أحمد",
    total_amount: 5000
  },
  {
    id: 2,
    order_number: "INV-1002",
    status: "processing",
    customer_name: "محمد",
    total_amount: 8200
  }
];

// RENDER
function renderOrders() {
  const container = document.getElementById("ordersContainer");

  container.innerHTML = state.orders.map(order => `
    <div class="order-card">
      <strong>#${order.order_number}</strong>
      <p>${order.customer_name}</p>
      <p>${order.total_amount} جنيه</p>

      <button onclick="openOrder(${order.id})" class="open-btn">
        عرض التفاصيل
      </button>
    </div>
  `).join("");
}

// OPEN SHEET
function openOrder(id) {
  const order = state.orders.find(o => o.id == id);
  if (!order) return;

  state.selectedOrder = order;

  document.getElementById("bottomSheet").classList.add("open");
  document.getElementById("sheetBackdrop").classList.add("show");

  document.getElementById("sheetBody").innerHTML = `
    <h3>تفاصيل الطلب</h3>
    <p>#${order.order_number}</p>
    <p>${order.customer_name}</p>
    <p>${order.total_amount} جنيه</p>
  `;
}

// INIT
renderOrders();
</script>

</body>
</html>
